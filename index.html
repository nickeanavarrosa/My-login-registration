<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 8-Navarrosa-Log In</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    
        body {
            background: linear-gradient(135deg, #17410d, #4f8b47);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }
    </style>
    
<body>

    <div class="login-card">
    <h2 class="text-center mb-4">Login</h2>
    
    <form action="#" method="POST">
        
        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" class="form-control form-control-lg is-invalid text-dark" id="passwordInput" placeholder="Password" value="12345">
            <label for="passwordInput" class="text-dark">Password</label>
            <div class="invalid-feedback text-warning fw-bold">
                Invalid password! Please try again.
            </div>
        </div>

        <a href="Act 8 register.html">Register</a>


        <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Sign In</button>
    </form>
</div>


</body>
</html>
