<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
       
        body {
            background: linear-gradient(135deg, #17410d, #4f8b47);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
<body>

    <div class="register-card">
    <h2 class="text-center mb-4">Student Registration</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Joshua Yoon" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Student LRN</label>
                <input type="text" class="form-control is-valid" value="136833151717">
                <div class="valid-feedback fw-bold text-info">
                    LRN verified successfully!
                </div>
            </div>
        </div>


       
        <div class="mb-3">
            <label class="form-label">Username Handle</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="student.username" required>
                <span class="input-group-text">@deped.gov.ph</span>
            </div>
        </div>


        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Programs Offered</label>
                <select class="form-select" required>
                    <option value="" selected disabled>Choose program...</option>
                    <option value="BSIT">BS Information Technology</option>
                    <option value="BSCS">BS Computer Science</option>
                    <option value="BSIS">BS Iformation Systems</option>
                    <option value="BSECE">BS Electronics Engineering</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label d-block">Gender </label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


       
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


    
        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to the digital Data Privacy Policy rules.
            </label>
        </div>

         <a href="index.html">Already have an account? Sign In</a>


        <button type="submit" class="btn btn-success w-100 py-2">Submit Registration</button>
    </form>
</div>

    
</body>
</html>
